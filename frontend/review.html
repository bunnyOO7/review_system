<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Review Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Review Generator</h1>

    <p class="sub">
        Generate your review and open Google Reviews instantly.
    </p>

    <textarea id="reviewText"></textarea>

    <div class="buttons">

        <button class="copyBtn" onclick="copyReview()">
            Copy Review
        </button>

         

        <button class="googleBtn" onclick="openGoogleReview()">
            Open Google Review
        </button>

    </div>

    <div class="status" id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
